<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Gold gradient for the Omega -->
    <linearGradient id="omega-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D060"/>
      <stop offset="30%" stop-color="#D4AF37"/>
      <stop offset="70%" stop-color="#B8962E"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <!-- Metallic gradient for the sword blade -->
    <linearGradient id="blade-metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8E8F0"/>
      <stop offset="15%" stop-color="#C0C0D0"/>
      <stop offset="50%" stop-color="#F0F0FF"/>
      <stop offset="85%" stop-color="#C0C0D0"/>
      <stop offset="100%" stop-color="#A0A0B0"/>
    </linearGradient>
    <!-- Subtle purple tint for sword accents (matching original) -->
    <linearGradient id="blade-accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9080C0"/>
      <stop offset="50%" stop-color="#B0A0E0"/>
      <stop offset="100%" stop-color="#8070B0"/>
    </linearGradient>
    <!-- Gold gradient for the crossguard -->
    <linearGradient id="guard-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8962E"/>
      <stop offset="50%" stop-color="#F0D060"/>
      <stop offset="100%" stop-color="#B8962E"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="gold-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#D4AF37" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="blade-glow" x="-30%" y="-10%" width="160%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feFlood flood-color="#B0A0E0" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Omega symbol (Ω) — open ring with feet -->
  <g filter="url(#gold-glow)">
    <!-- Main arc of the Omega — open at bottom -->
    <path
      d="M 62,148 A 52,52 0 1 1 138,148"
      fill="none"
      stroke="url(#omega-gold)"
      stroke-width="8"
      stroke-linecap="round"
    />
    <!-- Left foot -->
    <path
      d="M 62,148 L 48,148"
      fill="none"
      stroke="url(#omega-gold)"
      stroke-width="8"
      stroke-linecap="round"
    />
    <!-- Right foot -->
    <path
      d="M 138,148 L 152,148"
      fill="none"
      stroke="url(#omega-gold)"
      stroke-width="8"
      stroke-linecap="round"
    />
  </g>

  <!-- Sword — vertical, piercing through the Omega -->
  <g filter="url(#blade-glow)">
    <!-- Blade -->
    <path
      d="M 100,18 L 106,120 100,132 94,120 Z"
      fill="url(#blade-metal)"
      stroke="rgba(160,160,200,0.4)"
      stroke-width="0.5"
    />
    <!-- Blade center line (fuller) -->
    <line x1="100" y1="24" x2="100" y2="118" stroke="url(#blade-accent)" stroke-width="1.2" opacity="0.5"/>

    <!-- Crossguard -->
    <rect x="78" y="130" width="44" height="5" rx="2.5" fill="url(#guard-gold)"/>
    <!-- Crossguard end caps -->
    <circle cx="78" cy="132.5" r="3.5" fill="#D4AF37"/>
    <circle cx="122" cy="132.5" r="3.5" fill="#D4AF37"/>

    <!-- Grip -->
    <rect x="96" y="136" width="8" height="26" rx="2" fill="#8070B0"/>
    <!-- Grip wrapping lines -->
    <line x1="96" y1="141" x2="104" y2="141" stroke="#9080A0" stroke-width="0.8" opacity="0.6"/>
    <line x1="96" y1="146" x2="104" y2="146" stroke="#9080A0" stroke-width="0.8" opacity="0.6"/>
    <line x1="96" y1="151" x2="104" y2="151" stroke="#9080A0" stroke-width="0.8" opacity="0.6"/>
    <line x1="96" y1="156" x2="104" y2="156" stroke="#9080A0" stroke-width="0.8" opacity="0.6"/>

    <!-- Pommel -->
    <circle cx="100" cy="166" r="5" fill="#D4AF37"/>
    <circle cx="100" cy="166" r="2.5" fill="#F0D060" opacity="0.6"/>
  </g>
</svg>